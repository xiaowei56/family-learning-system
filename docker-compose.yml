version: "3.9"

name: family-learning-system

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: fls-postgres
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_learning}
      POSTGRES_USER: ${POSTGRES_USER:-fls_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fls_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fls_user} -d ${POSTGRES_DB:-family_learning}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fls-minio
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fls_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fls_minio_password}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fls-redis
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fls-fastapi
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fls_user}:${POSTGRES_PASSWORD:-fls_password}@postgres:5432/${POSTGRES_DB:-family_learning}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-fls_minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-fls_minio_password}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app

  paddleocr:
    build:
      context: ./paddleocr
      dockerfile: Dockerfile
    container_name: fls-paddleocr
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: fls-nginx
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "80:80"
    depends_on:
      - fastapi
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./web/dist:/var/www/static
